name: Poker Range Notification

on:
  schedule:
    # 6h-21h UTC couvre 8h-23h en hiver (UTC+1) et 8h-23h en été (UTC+2)
    # On utilise 2 lignes car l'heure change entre été et hiver
    # Été (UTC+2) : 6h-21h UTC = 8h-23h Paris
    # Hiver (UTC+1) : 7h-22h UTC = 8h-23h Paris
    # On prend l'union 6h-22h UTC pour couvrir les deux
    - cron: '0 6-22 * * *'
  workflow_dispatch:
    # Permet de déclencher manuellement pour tester

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Maybe send a range quiz notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          # 60% chance d'envoyer = ~10 notifs/jour sur 17 slots
          ROLL=$((RANDOM % 100))
          echo "Roll: $ROLL (envoie si < 60)"
          if [ "$ROLL" -ge 60 ]; then
            echo "Pas de notif cette heure-ci."
            exit 0
          fi

          # Charger les ranges depuis le dossier
          RANGE=$(ls ranges/*.png | shuf -n 1 | sed 's|ranges/||;s|\.png$||')
          echo "Range sélectionnée: $RANGE"

          # Encoder le nom pour l'URL
          ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$RANGE")

          # Envoyer la notification via ntfy
          curl -s \
            -H "Title: Quiz Range" \
            -H "Click: ${SITE_URL}?range=${ENCODED}" \
            -H "Tags: spade_suit" \
            -d "Range: ${RANGE}" \
            "https://ntfy.sh/${NTFY_TOPIC}"

          echo "Notification envoyée !"

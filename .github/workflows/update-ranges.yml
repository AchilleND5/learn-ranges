name: Update ranges.json

on:
  push:
    paths:
      - 'ranges/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate ranges.json
        run: |
          ls ranges/*.png | sed 's|ranges/||;s|\.png$//' | \
            python3 -c "import sys,json; print(json.dumps([l.strip() for l in sys.stdin], ensure_ascii=False, indent=2))" \
            > ranges.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git diff --quiet ranges.json && echo "No changes" && exit 0
          git add ranges.json
          git commit -m "Update ranges.json ($(python3 -c "import json; print(len(json.load(open('ranges.json'))))")  ranges)"
          git push
